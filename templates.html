<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шаблоны фотоальбома</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <style>
        .template-card {
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            overflow: visible;
            background: #f0f0f0;
        }
        .template-header {
            padding: 0.6rem 1rem;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 0.5rem 0.5rem 0 0;
        }
        .template-body {
            position: relative;
            height: 420px;
            overflow: hidden;
            background: #e8e8e8;
            border-radius: 0 0 0.5rem 0.5rem;
        }
        .template-body img.stub {
            position: absolute;
            width: 140px;
            height: 105px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 2px 3px 10px rgba(0, 0, 0, 0.25);
        }

        /* ===== Деловой стиль — аккуратная сетка ===== */
        .work-layout .stub:nth-child(1) { top: 20px;  left: 30px;  transform: rotate(-3deg); }
        .work-layout .stub:nth-child(2) { top: 20px;  left: 195px; transform: rotate(2deg);  }
        .work-layout .stub:nth-child(3) { top: 20px;  left: 360px; transform: rotate(-1deg); }
        .work-layout .stub:nth-child(4) { top: 150px; left: 60px;  transform: rotate(2deg);  }
        .work-layout .stub:nth-child(5) { top: 150px; left: 225px; transform: rotate(-2deg);}
        .work-layout .stub:nth-child(6) { top: 280px; left: 140px; transform: rotate(1deg);  }

        /* ===== Личное — свободная мозаика ===== */
        .personal-layout .stub:nth-child(1) { top: 15px;  left: 20px;  transform: rotate(-6deg); width: 160px; height: 120px; }
        .personal-layout .stub:nth-child(2) { top: 10px;  left: 200px; transform: rotate(4deg);  width: 130px; height: 98px;  }
        .personal-layout .stub:nth-child(3) { top: 130px; left: 60px;  transform: rotate(3deg);  width: 130px; height: 98px;  }
        .personal-layout .stub:nth-child(4) { top: 120px; left: 210px; transform: rotate(-5deg); width: 150px; height: 113px; }
        .personal-layout .stub:nth-child(5) { top: 260px; left: 110px; transform: rotate(2deg);  width: 160px; height: 120px; }
        .personal-layout .stub:nth-child(6) { top: 270px; left: 300px; transform: rotate(-3deg); width: 120px; height: 90px;  }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Фотоальбом Дарины Хоютановой</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Альбом</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="templates.html">Шаблоны</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h1 class="h2 mb-4">Шаблоны оформления фотоальбома</h1>

        <div class="row g-4 justify-content-center">
            <!-- Шаблон: Работа -->
            <div class="col-lg-5 col-md-6">
                <div class="template-card">
                    <div class="template-header bg-dark text-white">
                        Деловой стиль
                    </div>
                    <div class="template-body work-layout">
                        <img class="stub" src="img/placeholder.png" alt="">
                        <img class="stub" src="img/placeholder.png" alt="">
                        <img class="stub" src="img/placeholder.png" alt="">
                        <img class="stub" src="img/placeholder.png" alt="">
                        <img class="stub" src="img/placeholder.png" alt="">
                        <img class="stub" src="img/placeholder.png" alt="">
                    </div>
                </div>
            </div>

            <!-- Шаблон: Активный отдых (кликабельный) -->
            <div class="col-lg-5 col-md-6">
                <a href="album-personal.html" class="text-decoration-none text-reset">
                <div class="template-card" style="cursor: pointer;">
                    <div class="template-header text-white" style="background: linear-gradient(135deg, #9b59b6, #e74c3c);">
                        Активный отдых
                    </div>
                    <div class="template-body personal-layout">
                        <img class="stub" src="img/placeholder.png" alt="">
                        <img class="stub" src="img/placeholder.png" alt="">
                        <img class="stub" src="img/placeholder.png" alt="">
                        <img class="stub" src="img/placeholder.png" alt="">
                        <img class="stub" src="img/placeholder.png" alt="">
                        <img class="stub" src="img/placeholder.png" alt="">
                    </div>
                </div>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
