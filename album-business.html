<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деловой стиль — Фотоальбом</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #e8ecf1, #dfe6ed, #cfd8e0);
            min-height: 100vh;
        }

        .album-title {
            font-family: 'Georgia', serif;
            font-weight: 700;
            color: #2c3e50;
        }

        /* ===== Сетка ===== */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 1rem 0;
        }

        /* ===== Карточка ===== */
        .photo-card {
            position: relative;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.4s ease;
            animation: floatIn 0.6s ease both,
                       float 6s ease-in-out infinite;
        }
        .photo-card:nth-child(1) { animation-delay: 0s, 0s;   }
        .photo-card:nth-child(2) { animation-delay: 0.1s, 0.5s; }
        .photo-card:nth-child(3) { animation-delay: 0.2s, 1s;   }
        .photo-card:nth-child(4) { animation-delay: 0.3s, 1.5s; }
        .photo-card:nth-child(5) { animation-delay: 0.4s, 2s;   }
        .photo-card:nth-child(6) { animation-delay: 0.5s, 2.5s; }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        .photo-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 16px 35px rgba(44, 62, 80, 0.25);
            animation-play-state: paused;
        }

        /* --- Изображения --- */
        .photo-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            transition: filter 0.4s ease, transform 0.4s ease;
        }
        .photo-card:hover img {
            filter: brightness(1.05) contrast(1.05);
            transform: scale(1.04);
        }

        /* --- Оверлей --- */
        .photo-card .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(44, 62, 80, 0.75) 0%,
                rgba(52, 73, 94, 0.35) 50%,
                transparent 100%
            );
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            align-items: flex-end;
            padding: 1rem;
            z-index: 1;
            pointer-events: none;
        }
        .photo-card:hover .overlay {
            opacity: 1;
        }
        .photo-card .overlay span {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        /* ===== Модальные окна ===== */
        .modal-content {
            background: transparent;
            border: none;
            box-shadow: none;
        }
        .modal-body {
            padding: 0;
            text-align: center;
        }
        .modal-body img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(44, 62, 80, 0.35);
        }

        /* ===== Кнопка «Назад» ===== */
        .btn-back {
            border: 2px solid #2c3e50;
            color: #2c3e50;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: #2c3e50;
            color: #fff;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Фотоальбом Дарины Хоютановой</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Альбом</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="templates.html">Шаблоны</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h1 class="h2 album-title mb-0">Деловой стиль</h1>
            <a href="templates.html" class="btn btn-back btn-sm px-3 py-2 rounded-pill">← Назад к шаблонам</a>

        <div class="photo-grid">
            <!-- ФОТО -->
            <div class="photo-card" data-bs-toggle="modal" data-bs-target="#modalPhoto1">

            <div class="photo-card" data-bs-toggle="modal" data-bs-target="#modalPhoto2">

            <div class="photo-card" data-bs-toggle="modal" data-bs-target="#modalPhoto3">

            <div class="photo-card" data-bs-toggle="modal" data-bs-target="#modalPhoto4">
                <img src="img/деловой стиль 4.jpg" alt="Фото 4">
                <div class="overlay"><span>Фото 4</span></div>
            </div>
        </div>
    </div>

    <!-- ===== Модальные окна ===== -->
    <div class="modal fade" id="modalPhoto1" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content">
                <div class="modal-body position-relative">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3 z-3" data-bs-dismiss="modal"></button>

    <div class="modal fade" id="modalPhoto2" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content">
                <div class="modal-body position-relative">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3 z-3" data-bs-dismiss="modal"></button>
                    <img src="img/деловой стиль 2.jpg" alt="Фото 2">
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modalPhoto3" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content">
                <div class="modal-body position-relative">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3 z-3" data-bs-dismiss="modal"></button>
                    <img src="img/деловой стиль 3.jpg" alt="Фото 3">
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modalPhoto4" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content">
                <div class="modal-body position-relative">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3 z-3" data-bs-dismiss="modal"></button>
                    <img src="img/деловой стиль 4.jpg" alt="Фото 4">
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
