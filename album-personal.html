<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личное — Фотоальбом</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #fdf2f8, #f3e8ff, #ede9fe);
            min-height: 100vh;
        }

        /* ===== Заголовок ===== */
        .album-title {
            font-family: 'Georgia', serif;
            font-weight: 700;
            background: linear-gradient(135deg, #9b59b6, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== Сетка ===== */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            padding: 1rem 0;
        }

        /* ===== Карточка ===== */
        .photo-card {
            position: relative;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.4s ease;
            animation: floatIn 0.6s ease both,
                       float 6s ease-in-out infinite;
        }
        .photo-card:nth-child(1) { animation-delay: 0s, 0s;   }
        .photo-card:nth-child(2) { animation-delay: 0.1s, 0.5s; }
        .photo-card:nth-child(3) { animation-delay: 0.2s, 1s;   }
        .photo-card:nth-child(4) { animation-delay: 0.3s, 1.5s; }
        .photo-card:nth-child(5) { animation-delay: 0.4s, 2s;   }
        .photo-card:nth-child(6) { animation-delay: 0.5s, 2.5s; }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }

        .photo-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 20px 40px rgba(155, 89, 182, 0.3);
            animation-play-state: paused;
        }

        /* --- Изображения --- */
        .photo-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            transition: filter 0.4s ease, transform 0.4s ease;
        }
        .photo-card:hover img {
            filter: brightness(1.1) saturate(1.2);
            transform: scale(1.05);
        }

        /* --- Видео --- */
        .photo-card video {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            transition: filter 0.4s ease, transform 0.4s ease;
        }
        .photo-card:hover video {
            filter: brightness(1.1) saturate(1.2);
            transform: scale(1.05);
        }

        /* Иконка play поверх видео */
        .photo-card .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(155, 89, 182, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            pointer-events: none;
            transition: background 0.3s ease, transform 0.3s ease;
        }
        .photo-card:hover .play-icon {
            background: rgba(231, 76, 60, 0.9);
            transform: translate(-50%, -50%) scale(1.1);
        }
        .play-icon::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 0 10px 18px;
            border-color: transparent transparent transparent #fff;
            margin-left: 4px;
        }

        /* --- Оверлей --- */
        .photo-card .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(155, 89, 182, 0.7) 0%,
                rgba(231, 76, 60, 0.3) 50%,
                transparent 100%
            );
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            align-items: flex-end;
            padding: 1rem;
            z-index: 1;
        }
        .photo-card:hover .overlay {
            opacity: 1;
        }
        .photo-card .overlay span {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        /* ===== Лайтбокс ===== */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            cursor: zoom-out;
        }
        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(155, 89, 182, 0.4);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        .lightbox.active img {
            transform: scale(1);
        }
        .lightbox video {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(155, 89, 182, 0.4);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        .lightbox.active video {
            transform: scale(1);
        }

        /* ===== Кнопка «Назад» ===== */
        .btn-back {
            border: 2px solid #9b59b6;
            color: #9b59b6;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: #9b59b6;
            color: #fff;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Фотоальбом Дарины Хоютановой</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Альбом</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="templates.html">Шаблоны</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h1 class="h2 album-title mb-0">Личное</h1>
            <a href="templates.html" class="btn btn-back btn-sm px-3 py-2 rounded-pill">← Назад к шаблонам</a>
        </div>

        <div class="photo-grid">
            <!-- ФОТО -->
            <div class="photo-card">
                <img src="img/отдых1.jpg" alt="Фото 1">
                <div class="overlay"><span>Момент 1</span></div>
            </div>
            <div class="photo-card">
                <img src="img/отдых2.jpg" alt="Фото 2">
                <div class="overlay"><span>Момент 2</span></div>
            </div>
            <div class="photo-card">
                <img src="img/отдых3.jpg" alt="Фото 3">
                <div class="overlay"><span>Момент 3</span></div>
            </div>
            <div class="photo-card">
                <img src="img/отдых4.jpg" alt="Фото 4">
                <div class="overlay"><span>Момент 4</span></div>
            </div>

            <!-- ВИДЕО -->
            <div class="photo-card">
                <video src="video/отдых_видео_1.MP4" muted preload="metadata"></video>
                <div class="play-icon"></div>
                <div class="overlay"><span>Видео 1</span></div>
            </div>
            <div class="photo-card">
                <video src="video/отдых_видео_2.MP4" muted preload="metadata"></video>
                <div class="play-icon"></div>
                <div class="overlay"><span>Видео 2</span></div>
            </div>
        </div>
    </div>

    <!-- Лайтбокс (фото) -->
    <div class="lightbox" id="lightbox-image">
        <img src="" alt="Просмотр">
    </div>

    <!-- Лайтбокс (видео) -->
    <div class="lightbox" id="lightbox-video">
        <video controls></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            /* --- Фото-лайтбокс --- */
            const lightboxImage = document.getElementById('lightbox-image');
            const lightboxImg = lightboxImage.querySelector('img');

            document.querySelectorAll('.photo-card img').forEach(img => {
                img.addEventListener('click', function () {
                    lightboxImg.src = this.src;
                    lightboxImage.classList.add('active');
                });
            });

            lightboxImage.addEventListener('click', function () {
                lightboxImage.classList.remove('active');
                lightboxImg.src = '';
            });

            /* --- Видео-лайтбокс --- */
            const lightboxVideo = document.getElementById('lightbox-video');
            const lightboxVid = lightboxVideo.querySelector('video');

            document.querySelectorAll('.photo-card video').forEach(vid => {
                vid.addEventListener('click', function () {
                    lightboxVid.src = this.src;
                    lightboxVideo.classList.add('active');
                    lightboxVid.play();
                });
            });

            lightboxVideo.addEventListener('click', function () {
                lightboxVideo.classList.remove('active');
                lightboxVid.pause();
                lightboxVid.src = '';
            });

            /* --- Закрытие по Escape --- */
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    lightboxImage.classList.remove('active');
                    lightboxImg.src = '';
                    lightboxVideo.classList.remove('active');
                    lightboxVid.pause();
                    lightboxVid.src = '';
                }
            });
        });
    </script>
</body>
</html>
